<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>네이버 블로그 스타일 태그 입력</title>
    <style>
        /* 가짜 입력창 역할을 하는 컨테이너 */
        .tag-container {
            display: flex; /* 내부 요소들을 가로로 정렬 */
            flex-wrap: wrap; /* 태그가 많아지면 다음 줄로 */
            align-items: center;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: text; /* 텍스트 입력창처럼 보이게 커서 변경 */
        }

        /* 생성된 태그 블록 스타일 */
        .tag-item {
            display: flex;
            align-items: center;
            background-color: #e0e0e0;
            color: #333;
            padding: 4px 8px;
            border-radius: 15px;
            margin: 2px;
            font-size: 14px;
        }

        /* 태그 삭제 버튼 (x) */
        .tag-remove-btn {
            margin-left: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #888;
        }
        .tag-remove-btn:hover {
            color: #000;
        }
        
        /* 실제 텍스트를 입력받는 input */
        #tag-input {
            border: none;
            outline: none;
            padding: 6px;
            flex-grow: 1; /* 남은 공간을 모두 차지 */
            min-width: 100px; /* 최소 너비 */
            background-color: transparent;
        }
    </style>
</head>
<body>

    <h1>블로그 글쓰기</h1>
    <!-- 서버로 데이터를 보내기 위한 form -->
    <form id="post-form">
        <!-- ... 제목, 내용 등 다른 필드 ... -->
        
        <label for="tag-input">태그</label>
        
        <!-- 이 부분이 태그 시스템의 UI 입니다 -->
        <div class="tag-container" id="tag-container">
            <!-- JavaScript가 여기에 태그 블록(.tag-item)을 추가할 예정 -->
            <input type="text" id="tag-input" placeholder="#태그 입력 후 스페이스바">
        </div>

        <!-- 실제 서버로 전송될 태그 데이터가 저장되는 숨겨진 input -->
        <input type="hidden" name="tags" id="hidden-tags">

        <br>
        <button type="submit">저장하기</button>
    </form>


    <script>
        const tagContainer = document.getElementById('tag-container');
        const tagInput = document.getElementById('tag-input');
        const hiddenTagsInput = document.getElementById('hidden-tags');

        // 컨테이너 어디를 클릭해도 input에 포커스가 가도록 설정
        tagContainer.addEventListener('click', () => {
            tagInput.focus();
        });

        // 사용자가 키를 입력할 때마다 발생하는 이벤트 처리
        tagInput.addEventListener('keyup', (e) => {
            // 1. 스페이스바를 눌렀을 때
            if (e.key === ' ' || e.keyCode === 32) {
                const tagValue = tagInput.value.trim();

                // 입력값이 있고, #으로 시작하며, 글자 수가 1개 이상일 때만
                if (tagValue.startsWith('#') && tagValue.length > 1) {
                    createTag(tagValue.substring(1)); // '#'을 제외한 내용으로 태그 생성
                    tagInput.value = ''; // 입력창 비우기
                }
            }
        });

        // 백스페이스 키 처리를 위한 이벤트 (keyup보다 keydown이 더 적합)
        tagInput.addEventListener('keydown', (e) => {
            // 2. 백스페이스를 눌렀고, 입력창이 비어있을 때
            if ((e.key === 'Backspace' || e.keyCode === 8) && tagInput.value === '') {
                // 마지막 태그를 찾아서 지운다
                const lastTag = tagContainer.querySelector('.tag-item:last-of-type');
                if (lastTag) {
                    lastTag.remove();
                    updateHiddenInput(); // 숨겨진 input 값 업데이트
                }
            }
        });

        // 태그 블록을 생성하는 함수
        function createTag(text) {
            const tagItem = document.createElement('span');
            tagItem.classList.add('tag-item');
            tagItem.textContent = `#${text}`; // 화면에는 #을 붙여서 보여줌
            
            // 태그 데이터 저장 (숨겨진 input에는 # 없이 저장)
            tagItem.dataset.tagValue = text;

            const removeBtn = document.createElement('span');
            removeBtn.classList.add('tag-remove-btn');
            removeBtn.textContent = 'x';
            // 3. 'x' 버튼 클릭 시 해당 태그 삭제
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // 이벤트 버블링 방지
                e.target.parentElement.remove();
                updateHiddenInput(); // 숨겨진 input 값 업데이트
            });

            tagItem.appendChild(removeBtn);

            // 실제 입력창(.tag-input) 앞에 태그 블록을 삽입
            tagContainer.insertBefore(tagItem, tagInput);
            
            updateHiddenInput(); // 숨겨진 input 값 업데이트
        }
        
        // 숨겨진 input의 값을 업데이트하는 함수
        function updateHiddenInput() {
            const tags = Array.from(tagContainer.querySelectorAll('.tag-item'))
                              .map(tag => tag.dataset.tagValue); // data-tag-value 값들을 모음
            hiddenTagsInput.value = tags.join(','); // 콤마로 구분된 문자열로 변환
            console.log('Hidden Input Value:', hiddenTagsInput.value); // 확인용 로그
        }

        // 폼 제출 시 최종 값 확인
        document.getElementById('post-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // 마지막으로 입력창에 남아있는 텍스트도 태그로 변환
            const lastValue = tagInput.value.trim();
            if (lastValue.startsWith('#') && lastValue.length > 1) {
                createTag(lastValue.substring(1));
                tagInput.value = '';
            }
            alert(`서버로 전송될 태그: ${hiddenTagsInput.value}`);
            // 실제로는 여기서 form.submit()을 호출하거나 fetch API로 서버에 전송
        });
    </script>

</body>
</html>
