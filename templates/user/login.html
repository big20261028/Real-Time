<div class="container text-center p-5">
  <form action="{{ url_for('user.loginOk')}}" method="POST">
    <div class="form-floating mb-3">
      <input type="input" class="form-control" id="login_user_id" name="user_id" placeholder="name@example.com">
      <label for="floatingInput">아이디</label>
    </div>
    <div class="form-floating">
      <input type="password" class="form-control" id="login_user_pw" name="user_pw" placeholder="Password">
      <label for="floatingPassword">비밀번호</label>
    </div>
    <div class="container p-3">
      <input type="submit" class="btn btn-secondary btn-lg" id="btn-login" style="width: 150px;" value="로그인">
    </div>
    <div class="find_password pt-3">
      <a href="#">아이디 찾기</a> | <a href="#">비밀번호 찾기</a> | <a data-bs-toggle="modal" href="#joinModal">회원가입</a>
    </div>
  </form>
</div>
