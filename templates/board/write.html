{% include 'include/header.html' %}
<script>
  $(function () {
    {% if categorie_no and categorie_parent_no %}
      $.ajax({
        url: 'parent_categorie.do',
        type: 'get',
        success: function (data) {
          //console.log(data);
          html = "";
          html += "<option value='0'>대분류</option>"
          for (let i = 0; i < data.length; i++) {
            if (data[i].categorie_no == {{ categorie_parent_no }} )
          {
            html += "<option value='" + data[i].categorie_no + "' selected>";
          }else
          {
            html += "<option value='" + data[i].categorie_no + "'>";
          }
          html += data[i].categorie_name
          html += "</option>"
          }
          $("#write_categorie_parent_no").html(html);
          }
        });
      $.ajax({
        url: 'child_categorie.do?categorie_parent_no={{categorie_parent_no}}',
        type: 'get',
        success: function (data) {
          //console.log(data);
          html = "";
          for (let i = 0; i < data.length; i++) {
            if (data[i].categorie_no == {{ categorie_no }} )
            {
              html += "<option value='" + data[i].categorie_no + "' selected>";
            }else
            {
              html += "<option value='" + data[i].categorie_no + "'>";
            }
            html += data[i].categorie_name
            html += "</option>"
          }
          $("#write_categorie_no").html(html);
        }
      });
    {% else %}
      $.ajax({
        url: 'parent_categorie.do',
        type: 'get',
        success: function (data) {
          //console.log(data);
          html = "";
          html += "<option value='0'>대분류</option>"
          for (let i = 0; i < data.length; i++) {
            html += "<option value='" + data[i].categorie_no + "'>";
            html += data[i].categorie_name
            html += "</option>"
          }
          $("#write_categorie_parent_no").html(html);
        }
      });
    {% endif %}

    $("#write_categorie_parent_no").change(function () {
      if ($("#write_categorie_parent_no").val() == 0) {
        html = "<option value=''>대분류를 선택해주세요.</option>"
        $("#write_categorie_no").html(html);
        return;
      }

      $.ajax({
        url: 'child_categorie.do',
        type: 'get',
        data: {
          categorie_parent_no: $("#write_categorie_parent_no").val()
        },
        success: function (data) {
          //console.log(data);
          html = "";
          for (let i = 0; i < data.length; i++) {
            html += "<option value='" + data[i].categorie_no + "'>";
            html += data[i].categorie_name
            html += "</option>"
          }
          $("#write_categorie_no").html(html);
        }
      });
    });

    $("#writeBtn").click(function () {
      DoWrite();
    });
    $("#write_board_note").change(function(){
      ReccomendTags();
    });
    $("#write_board_note").on('paste',function(){
      $(this).trigger('change');
    });

    var input = document.querySelector('#write_tags');

    const tagify = new Tagify(input, {
          pattern: /^#/,      // '#'으로 시작하는 태그만 허용
          delimiters: " ",    // 스페이스바를 구분자로 사용, 엔터는 기본 구분자
      });

    $('#tagRecomend').on('click', 'button', function() {
        // 클릭된 버튼의 data-tag 속성 값을 가져옵니다 (예: '일상')
        const tagName = $(this).data('tag');
        
        // 4. tagify 변수(리모컨)를 사용해 태그를 추가합니다!
        // addTags는 Tagify가 제공하는 내장 함수(메서드)입니다.
        if (tagName) {
            tagify.addTags([tagName]);
        }
    });

    
  });


  function DoWrite() {
    if ($("#write_categorie_no").val() == "") {
      alert("카테고리를 선택하세요.");
      $("#write_categorie_no").focus();
      return;
    }
    if (!$("#write_board_title").val().trim()) {
      alert("제목을 입력하세요.");
      $("#write_board_title").focus();
      return;
    }
    if (!$("#write_board_note").val().trim()) {
      alert("내용을 입력하세요.");
      $("#write_board_note").focus();
      return;
    }
    if (confirm("게시물을 등록하시겠습니까?")) {
      $("#writeFrm").submit();
    }
  };

  function ReccomendTags(){
    if ($("#write_board_title").val() == "" || $("#write_board_note").val() == "") return;

    $.ajax({
      url: "{{ url_for('api.rec_tags') }}", 
      type: 'POST',
      data: { 
        board_title: $("#write_board_title").val(), 
        board_note:  $("#write_board_note").val() 
      },
      success: function(response) {
        if (response.status === 'success' && response.posts.length > 0) {
              response.posts.forEach(function(post) { // post = ( data, data )
                const postHtml = '<button type="button" class="btn btn-outline-primary btn-sm mb-1" data-tag="#' + post[0] + '">#' + post[0] + '</button>&nbsp;';
                $("#tagRecomend").append(postHtml);
              });
          }
      },
      error: function(error) {
          console.error("Error loading posts:", error);
      }
    });
  }
</script>

<!-- 컨텐츠 출력 공간 -->
<h3 class="fw-bold my-2"> 글쓰기</h3>
<form method="post" action="/board/writeok.do" id="writeFrm">
  <div class="row">
    <div class="col">
      <select class="form-select form-select-lg" aria-label="Large select example" name="categorie_parent_no"
        id="write_categorie_parent_no">
        <option selected>대분류</option>
      </select>
    </div>
    <div class="col">
      <select class="form-select form-select-lg" aria-label="Large select example" name="categorie_no"
        id="write_categorie_no">
        <option value=''>대분류를 선택해주세요.</option>
      </select>
    </div>
  </div>
  <div class="input-group-lg my-1">
    <input type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg"
      name="board_title" id="write_board_title" placeholder="제목을 입력해주세요.">
  </div>

  <div class="input-group-lg mb-1">
    <textarea class="form-control" style="height: 300px" name="board_note" id="write_board_note"
      placeholder="내용을 입력해주세요."></textarea>
  </div>
  <!-- sns 해시태그 시스템이 들어갈 공간 -->
  <div class="input-group-lg my-1">
    <input class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg" name="tags"
      id="write_tags" value="" placeholder="#태그 입력 후 엔터 또는 스페이스바">
  </div>

  <!-- 태그 추천 공간 -->
  <label for="tagRecomend" class="form-label p-1 fw-bold">AI가 작성한 글을 감지해서 태그를 추천해드려요.</label>
  <div class="p-1" id="tagRecomend">
  </div>
  <!-- ******* -->
  <div class="d-grid gap-2 d-md-flex justify-content-md-end">
    <button class="btn btn-primary" type="button" id="writeBtn">완료</button>
  </div>
</form>
